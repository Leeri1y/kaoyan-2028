databases:
  - name: kaoyan-2028-db
    plan: free
    databaseName: kaoyan2028
    user: kaoyan2028

services:
  - type: web
    name: kaoyan-2028
    runtime: node
    repo: https://github.com/Leeri1y/kaoyan-2028
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: API_PUBLIC_URL
        value: https://kaoyan-2028.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: kaoyan-2028-db
          property: connectionString
      - key: APP_TOKEN
        sync: false
