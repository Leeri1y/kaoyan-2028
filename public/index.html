<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <meta name="theme-color" content="#2c3e50">
  <title>2028考研备考系统 — 广州大学 085406 控制工程</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="header-left">
          <div class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div>
            <div class="header-title">2028 考研备考系统</div>
            <div class="header-sub">广州大学 · 085406 控制工程</div>
          </div>
        </div>
        <div class="header-right">
          <div class="phase-indicator" id="phaseIndicator">地基期</div>
          <div class="date-display" id="dateDisplay"></div>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="overview">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="tab-label">备考概览</span>
      </button>
      <button class="tab-btn" data-tab="daily">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span class="tab-label">每日学习</span>
      </button>
      <button class="tab-btn" data-tab="tracker">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span class="tab-label">每日打卡</span>
      </button>
      <button class="tab-btn" data-tab="syllabus">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span class="tab-label">专业课大纲</span>
      </button>
      <button class="tab-btn" data-tab="resources">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span class="tab-label">学习资料</span>
      </button>
    </nav>

    <!-- Content -->
    <main class="app-content" id="appContent">
      <div class="tab-panel active" id="panel-overview"></div>
      <div class="tab-panel" id="panel-daily"></div>
      <div class="tab-panel" id="panel-tracker"></div>
      <div class="tab-panel" id="panel-syllabus"></div>
      <div class="tab-panel" id="panel-resources"></div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="/js/ipa.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/overview.js"></script>
  <script src="/js/tracker.js"></script>
  <script src="/js/resources.js"></script>
  <script src="/js/daily.js"></script>
  <script src="/js/syllabus.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
